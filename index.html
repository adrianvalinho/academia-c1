<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia C1 – Xunta de Galicia</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#003DA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Academia C1">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#eef3fb;--sidebar-bg:#002B7A;--sidebar-hover:#003899;--sidebar-active:#003DA5;--accent:#003DA5;--accent2:#1a5cbf;--gold:#C9A84C;--white:#fff;--border:#c8d8ef;--text:#00215A;--muted:#5a7aa0;--ok:#22a06b;--ko:#d93025;--warn:#e6a817;--sidebar-w:270px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}
h1,h2,h3,.topbar h1,.modal h2,.big-score{font-family:'Lora',Georgia,serif;}
.topbar{background:var(--white);border-bottom:2px solid var(--gold);padding:14px 24px;display:flex;align-items:center;gap:12px;}
.topbar h1{font-size:1.1rem;font-weight:700;color:var(--accent);}
.topbar p{font-size:.8rem;color:var(--muted);}
#sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .3s;}
#sidebar.collapsed{width:52px;}
.sidebar-header{padding:16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.sidebar-header .logo{font-size:1.4rem;flex-shrink:0;}
.sidebar-header h2{color:#fff;font-size:.88rem;font-weight:700;white-space:nowrap;}
.sidebar-header p{color:rgba(255,255,255,.5);font-size:.7rem;white-space:nowrap;}
.sidebar-toggle{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:1rem;flex-shrink:0;}
.sidebar-toggle:hover{color:#fff;}
.add-materia-btn{margin:12px 10px 4px;padding:8px 12px;background:var(--sidebar-active);color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;}
.add-materia-btn:hover{background:#1559a8;}
.simulacro-btn{margin:4px 10px 10px;padding:8px 12px;background:linear-gradient(90deg,#4a0a0a,#7c1a1a);color:#ff9999;border:1px solid #7c1a1a;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;transition:all .2s;}
.simulacro-btn:hover{background:linear-gradient(90deg,#6a0a0a,#9c2a2a);color:#ffbbbb;}
.sidebar-nav{flex:1;overflow-y:auto;padding-bottom:12px;}
.sidebar-nav::-webkit-scrollbar{width:4px;}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}
.materia-header{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;color:rgba(255,255,255,.85);font-size:.84rem;font-weight:600;border-radius:8px;margin:2px 6px;transition:background .15s;white-space:nowrap;overflow:hidden;}
.materia-header:hover{background:var(--sidebar-hover);}
.materia-header .icon{font-size:1rem;flex-shrink:0;}
.materia-header .name{flex:1;overflow:hidden;text-overflow:ellipsis;}
.materia-header .chevron{font-size:.65rem;flex-shrink:0;transition:transform .2s;}
.materia-header .score-badge{font-size:.65rem;background:rgba(255,255,255,.12);padding:1px 6px;border-radius:99px;flex-shrink:0;}
.materia-header.open .chevron{transform:rotate(90deg);}
.materia-sub{display:none;}
.materia-sub.open{display:block;}
.sub-item{display:flex;align-items:center;gap:8px;padding:7px 12px 7px 30px;color:rgba(255,255,255,.6);font-size:.8rem;cursor:pointer;border-radius:8px;margin:1px 6px;transition:background .15s,color .15s;white-space:nowrap;}
.sub-item:hover{background:var(--sidebar-hover);color:#fff;}
.sub-item.active{background:var(--sidebar-active);color:#fff;}
.materia-delete{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:.75rem;flex-shrink:0;padding:0 2px;}
.materia-delete:hover{color:var(--ko);}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
/* topbar defined in :root block above */
@keyframes escudoPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 3px #C9A84C);}50%{transform:scale(1.2);filter:drop-shadow(0 0 10px #C9A84C);}}
.escudo-gal{width:36px;height:44px;display:inline-block;vertical-align:middle;margin-right:8px;animation:escudoPulse 0.8s ease-in-out 3;}
.frase-animo{font-weight:700;color:var(--accent);font-family:'Lora',serif;font-size:.95rem;}
.content{flex:1;overflow-y:auto;padding:24px;}
.content::-webkit-scrollbar{width:6px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* SIMULACRO MODE */
body.simulacro-mode{background:#0a0a0f;}
body.simulacro-mode #sidebar{background:#0d0d15;border-right:1px solid #2a1a1a;}
body.simulacro-mode .topbar{background:#0d0d15;border-bottom:1px solid #2a1a1a;}
body.simulacro-mode .topbar h1{color:#cc3333;}
body.simulacro-mode .topbar p{color:#664444;}
body.simulacro-mode .content{background:#0a0a0f;}
body.simulacro-mode #main{background:#0a0a0f;}
.simulacro-overlay{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse at center,transparent 40%,rgba(80,0,0,0.4) 100%);}
.simulacro-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;width:2px;height:2px;background:rgba(180,0,0,0.6);border-radius:50%;animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0;}10%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(-10vh) translateX(var(--dx));opacity:0;}}

/* SIMULACRO LAUNCH */
.sim-launch{max-width:560px;margin:0 auto;text-align:center;position:relative;z-index:2;}
.sim-launch .sim-icon{font-size:4rem;margin-bottom:16px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.sim-launch h1{font-size:2rem;font-weight:900;color:#cc3333;margin-bottom:8px;text-shadow:0 0 20px rgba(200,0,0,0.5);}
.sim-launch p{font-size:.9rem;color:#886666;margin-bottom:32px;line-height:1.6;}
.sim-config-box{background:#0d0d18;border:1px solid #3a1a1a;border-radius:16px;padding:28px;margin-bottom:24px;text-align:left;}
.sim-config-box h3{color:#cc3333;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;}
.sim-slider-wrap{margin-bottom:8px;}
.sim-slider-wrap label{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:#886666;margin-bottom:8px;}
.sim-slider-wrap label span{color:#cc3333;font-weight:800;font-size:1.1rem;}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:99px;background:linear-gradient(90deg,#cc3333,#4a0a0a);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#cc3333;cursor:pointer;box-shadow:0 0 8px rgba(200,0,0,0.6);}
.sim-info{font-size:.75rem;color:#664444;margin-top:12px;line-height:1.5;}
.sim-start-btn{width:100%;padding:16px;background:linear-gradient(90deg,#7c0000,#cc3333);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:900;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;transition:all .2s;box-shadow:0 4px 20px rgba(200,0,0,0.4);}
.sim-start-btn:hover{background:linear-gradient(90deg,#9c0000,#ee4444);box-shadow:0 4px 30px rgba(200,0,0,0.6);}
.sim-music-toggle{display:flex;align-items:center;gap:8px;margin-top:16px;justify-content:center;cursor:pointer;color:#664444;font-size:.82rem;}
.sim-music-toggle input{accent-color:#cc3333;}

/* SIMULACRO QUIZ */
.sim-quiz-wrap{max-width:720px;position:relative;z-index:2;}
.sim-topbar{display:flex;align-items:center;gap:16px;margin-bottom:24px;background:#0d0d18;border:1px solid #2a1a1a;border-radius:12px;padding:14px 18px;}
.sim-timer{font-size:1.4rem;font-weight:900;color:#cc3333;font-variant-numeric:tabular-nums;min-width:80px;text-shadow:0 0 10px rgba(200,0,0,0.5);}
.sim-timer.warning{color:#ff6600;animation:blink .5s ease-in-out infinite;}
.sim-timer.critical{color:#ff0000;animation:blink .3s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.sim-prog{flex:1;}
.sim-prog-bar-wrap{background:#1a0a0a;border-radius:99px;height:6px;overflow:hidden;}
.sim-prog-bar{height:100%;background:linear-gradient(90deg,#cc3333,#ff6600);border-radius:99px;transition:width .4s;box-shadow:0 0 8px rgba(200,0,0,0.5);}
.sim-prog-label{font-size:.72rem;color:#664444;margin-top:4px;display:flex;justify-content:space-between;}
.sim-score-live{font-size:.9rem;font-weight:700;color:#886666;}
.sim-q-num{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#664444;margin-bottom:8px;}
.sim-q-text{font-size:1rem;font-weight:600;color:#ddbbbb;line-height:1.6;margin-bottom:20px;}
.sim-q-materia{font-size:.72rem;color:#664444;margin-bottom:16px;font-style:italic;}
.sim-options{display:flex;flex-direction:column;gap:10px;}
.sim-opt{display:flex;align-items:flex-start;gap:10px;background:#0d0d18;border:1.5px solid #2a1a1a;border-radius:10px;padding:13px 15px;cursor:pointer;text-align:left;font-size:.9rem;color:#ccaaaa;transition:all .15s;line-height:1.45;}
.sim-opt:hover:not(:disabled){border-color:#cc3333;background:#150505;transform:translateX(3px);}
.sim-opt .letter{font-weight:700;color:#cc3333;min-width:20px;font-size:.85rem;margin-top:1px;flex-shrink:0;}
.sim-opt.correct{border-color:#22a06b;background:#051a0f;color:#88ddaa;}
.sim-opt.correct .letter{color:#22a06b;}
.sim-opt.incorrect{border-color:#cc3333;background:#1a0505;color:#dd8888;}
.sim-opt.reveal{border-color:#22a06b;background:#051a0f;color:#88ddaa;opacity:.8;}
.sim-opt:disabled{cursor:default;transform:none;}
.sim-feedback{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:.85rem;line-height:1.5;display:none;}
.sim-feedback.show{display:block;}
.sim-feedback.ok{background:#051a0f;color:#88ddaa;border-left:3px solid #22a06b;}
.sim-feedback.ko{background:#1a0505;color:#dd8888;border-left:3px solid #cc3333;}
.sim-next-btn{width:100%;margin-top:16px;padding:13px;background:linear-gradient(90deg,#7c0000,#cc3333);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;display:none;text-transform:uppercase;letter-spacing:.05em;}
.sim-next-btn:hover{opacity:.9;}

/* SIMULACRO RESULTS */
.sim-results{max-width:660px;margin:0 auto;text-align:center;position:relative;z-index:2;}
.sim-results .big-score{font-size:5rem;font-weight:900;line-height:1;margin-bottom:4px;text-shadow:0 0 30px currentColor;}
.sim-results .score-label{font-size:1rem;color:#886666;margin-bottom:16px;}
.sim-grade{display:inline-block;padding:8px 24px;border-radius:99px;font-weight:700;font-size:1rem;margin-bottom:28px;}
.sim-grade.high{background:#051a0f;color:#22a06b;border:1px solid #22a06b;}
.sim-grade.mid{background:#1a1200;color:#e6a817;border:1px solid #e6a817;}
.sim-grade.low{background:#1a0505;color:#cc3333;border:1px solid #cc3333;}
.sim-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.sim-stat{background:#0d0d18;border:1px solid #2a1a1a;border-radius:12px;padding:14px;}
.sim-stat .n{font-size:1.6rem;font-weight:800;}
.sim-stat .l{font-size:.72rem;color:#664444;margin-top:2px;}
.sim-stat.ok .n{color:#22a06b;}
.sim-stat.ko .n{color:#cc3333;}
.sim-stat.tot .n{color:#886666;}
.sim-stat.tim .n{color:#e6a817;}
.sim-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.sim-btn{padding:10px 20px;border-radius:8px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;}
.sim-btn-primary{background:linear-gradient(90deg,#7c0000,#cc3333);color:#fff;}
.sim-btn-secondary{background:#0d0d18;border:1px solid #3a1a1a;color:#886666;}
.sim-btn-secondary:hover{color:#ccaaaa;border-color:#664444;}
.sim-wrong-review{text-align:left;}
.sim-wrong-review h3{font-size:.95rem;font-weight:700;margin-bottom:14px;color:#cc3333;}
.sim-wrong-item{background:#0d0d18;border:1px solid #2a1a1a;border-radius:12px;padding:16px;margin-bottom:10px;}
.sim-wrong-item .wq{font-size:.88rem;font-weight:600;margin-bottom:6px;color:#ddbbbb;}
.sim-wrong-item .wm{font-size:.72rem;color:#664444;margin-bottom:8px;font-style:italic;}
.sim-wrong-item .w-ans{font-size:.82rem;margin-bottom:3px;}
.sim-wrong-item .w-ans.ko{color:#cc3333;}
.sim-wrong-item .w-ans.ok{color:#22a06b;}
.sim-wrong-item .w-exp{font-size:.8rem;color:#664444;margin-top:8px;padding-top:8px;border-top:1px solid #2a1a1a;line-height:1.5;}

/* SIMULACRO HISTORY */
.sim-history{max-width:640px;}
.sim-history-item{background:#0d0d18;border:1px solid #2a1a1a;border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.sim-history-item .hi-score{font-size:1.4rem;font-weight:800;min-width:52px;text-align:center;}
.sim-history-item .hi-info{flex:1;}
.sim-history-item .hi-info h4{font-size:.88rem;font-weight:700;color:#ddbbbb;}
.sim-history-item .hi-info p{font-size:.75rem;color:#664444;}

/* NORMAL STYLES */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;}
.home-card{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:20px;cursor:pointer;transition:box-shadow .2s,transform .15s;}
.home-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px);}
.home-card .hc-icon{font-size:2rem;margin-bottom:10px;}
.home-card h3{font-size:.95rem;font-weight:700;margin-bottom:4px;font-family:'Lora',serif;color:var(--accent);}
.home-card p{font-size:.78rem;color:var(--muted);}
.home-card .pm{margin-top:12px;background:#e8edf2;border-radius:99px;height:5px;overflow:hidden;}
.home-card .pm-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;}
.upload-section{max-width:700px;}
.upload-tabs{display:flex;gap:8px;margin-bottom:20px;}
.upload-tab{padding:8px 18px;border-radius:8px;border:2px solid var(--border);background:var(--white);font-size:.85rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;}
.upload-tab.active{border-color:var(--accent);color:var(--accent);background:#eef4fc;}
.drop-zone{border:2px dashed var(--border);border-radius:14px;padding:40px;text-align:center;background:var(--white);cursor:pointer;transition:border-color .2s,background .2s;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:#eef4fc;}
.drop-zone .dz-icon{font-size:2.5rem;margin-bottom:10px;}
.drop-zone h3{font-size:.95rem;font-weight:700;margin-bottom:6px;}
.drop-zone p{font-size:.8rem;color:var(--muted);}
.file-input{display:none;}
.file-list{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
.file-row{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.file-row .file-icon{font-size:1.3rem;}
.file-row .file-info{flex:1;}
.file-row .file-name{font-size:.85rem;font-weight:600;}
.file-row .file-size{font-size:.75rem;color:var(--muted);}
.file-row .file-type{font-size:.72rem;padding:3px 8px;border-radius:99px;font-weight:700;}
.file-row .file-type.teoria{background:#eef4fc;color:var(--accent);}
.file-row .file-type.test{background:#e8f9f0;color:var(--ok);}
.file-row .del-file{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;}
.file-row .del-file:hover{color:var(--ko);}
.theory-view{max-width:900px;}
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .2s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{opacity:.85;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:1px solid rgba(201,168,76,.3);}
.btn-secondary{background:var(--white);border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:#fdecea;color:var(--ko);}
.summary-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px;margin-top:20px;line-height:1.7;font-size:.9rem;white-space:pre-wrap;}
.summary-box h3{margin-bottom:12px;font-size:1rem;color:var(--accent);}
.pdf-list{display:flex;flex-direction:column;gap:10px;}
.pdf-item{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.pdf-item .pdf-icon{font-size:1.8rem;}
.pdf-item .pdf-info{flex:1;}
.pdf-item .pdf-name{font-size:.9rem;font-weight:600;}
.pdf-item .pdf-meta{font-size:.75rem;color:var(--muted);margin-top:2px;}
.test-view{max-width:700px;}
.test-options-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.test-option-card{background:var(--white);border:2px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all .15s;text-align:center;}
.test-option-card:hover{border-color:var(--accent);background:#eef4fc;}
.test-option-card .toc-icon{font-size:2rem;margin-bottom:8px;}
.test-option-card h3{font-size:.9rem;font-weight:700;margin-bottom:4px;}
.test-option-card p{font-size:.75rem;color:var(--muted);}
.instrucciones-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px;}
.instrucciones-box .ib-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.instrucciones-box .ib-title{font-size:.85rem;font-weight:700;}
.instrucciones-box .ib-badge{font-size:.7rem;padding:2px 8px;border-radius:99px;background:#e8f9f0;color:var(--ok);font-weight:700;}
.instrucciones-box .ib-badge.custom{background:#fff8e1;color:var(--warn);}
.instrucciones-box textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;outline:none;resize:vertical;min-height:80px;line-height:1.5;font-family:inherit;}
.instrucciones-box textarea:focus{border-color:var(--accent);}
.instrucciones-box .ib-footer{display:flex;gap:8px;margin-top:10px;align-items:center;}
.instrucciones-box .ib-hint{font-size:.75rem;color:var(--muted);flex:1;}
.quiz-wrap{max-width:680px;}
.progress-bar-wrap{background:#e8edf2;border-radius:99px;height:8px;margin-bottom:6px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s;}
.progress-label{font-size:.78rem;color:var(--muted);margin-bottom:20px;display:flex;justify-content:space-between;}
.score-live{font-weight:700;color:var(--accent);}
.q-num{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:6px;}
.q-text{font-size:1rem;font-weight:600;line-height:1.55;margin-bottom:18px;}
.options{display:flex;flex-direction:column;gap:9px;}
.opt-btn{display:flex;align-items:flex-start;gap:10px;background:#f7f9fb;border:2px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;font-size:.9rem;color:var(--text);transition:border-color .15s,background .15s,transform .1s;line-height:1.45;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:#eef4fc;transform:translateX(3px);}
.opt-btn .letter{font-weight:700;color:var(--accent);min-width:20px;font-size:.85rem;margin-top:1px;flex-shrink:0;}
.opt-btn.correct{border-color:var(--ok);background:#e8f9f0;color:#145c3c;}
.opt-btn.correct .letter{color:var(--ok);}
.opt-btn.incorrect{border-color:var(--ko);background:#fdecea;color:#7c1a14;}
.opt-btn.incorrect .letter{color:var(--ko);}
.opt-btn.reveal{border-color:var(--ok);background:#e8f9f0;color:#145c3c;opacity:.8;}
.opt-btn:disabled{cursor:default;transform:none;}

async function dbCountCachedQuestions(mid){if(!sb)return 0;const{count}=await sb.from('preguntas_cache').select('*',{count:'exact',head:true}).eq('materia_id',mid);return count||0;}

async function launchSimulacro(){

  }
}

async function buildSimulacroQuestions(total){
  console.log('[SIM] buildSimulacroQuestions total=',total);
  console.log('[SIM] state.materias total=',state.materias.length, state.materias.map(m=>({name:m.name,files:m.files?.length??'undefined'})));
  const materiasConArchivos=state.materias.filter(m=>(m.files||[]).some(f=>f.type==='test'||f.type==='teoria'));
  console.log('[SIM] materiasConArchivos=',materiasConArchivos.length, materiasConArchivos.map(m=>({name:m.name,test:m.files.filter(f=>f.type==='test').length,teoria:m.files.filter(f=>f.type==='teoria').length})));
  if(!materiasConArchivos.length)throw new Error('No hay materias con archivos subidos.');
  const pesos=materiasConArchivos.map(m=>({m,peso:m.files.length}));
  const totalPeso=pesos.reduce((a,p)=>a+p.peso,0);
  const reparto=pesos.map(p=>({m:p.m,n:Math.max(1,Math.round((p.peso/totalPeso)*total))}));
  let suma=reparto.reduce((a,r)=>a+r.n,0),i=0;
  while(suma<total){reparto[i%reparto.length].n++;suma++;i++;}
  while(suma>total){reparto[i%reparto.length].n=Math.max(1,reparto[i%reparto.length].n-1);suma--;i++;}
  console.log('[SIM] reparto=',reparto.map(r=>({name:r.m.name,n:r.n})));
  const results=await Promise.all(reparto.map(async({m,n})=>{
    try{
      const qs=await generateSimQuestions(m,n);
      console.log(`[SIM] ${m.name}: got ${qs.length} questions`);
      qs.forEach(q=>{q._materia=m.name;q._materiaIcon=m.icon;});
      return qs;
    }catch(e){console.error(`[SIM] ${m.name} THREW:`,e.message);return[];}
  }));
  const flat=results.flat();
  console.log('[SIM] total pool=',flat.length);
  return flat;
}

async function generateSimQuestions(m,n){
  // Cache primero — si hay suficiente, retorno inmediato sin Gemini
  const cached=await dbGetCachedQuestions(m.id,n);
  if(cached.length>0)return cached;
  // Sin caché: una sola tanda paralela por archivo, sin rondas secuenciales
  const files=[...m.files.filter(f=>f.type==='test'),...m.files.filter(f=>f.type==='teoria')];
  if(!files.length)return[];
  const ti=m.temario?`CRÍTICO: Genera preguntas ÚNICAMENTE sobre: ${m.temario}. No hagas preguntas de otras partes.`:'Genera preguntas variadas de todo el documento.';
  const perFile=Math.max(n,Math.ceil(n/files.length)+5);// pedir un poco más para tener margen
  const results=await Promise.allSettled(files.map(async f=>{
    const data=await dbGetFileData(f.id);if(!data)return[];
    const text=await callClaude([{role:'user',content:[
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:data.split(',')[1]}},
      {type:'text',text:`Eres experto en oposiciones C1 de la Xunta de Galicia. ${ti}
Genera exactamente ${perFile} preguntas tipo test para un simulacro oficial de examen. Devuelve SOLO un array JSON sin backticks:
[{"q":"pregunta","opts":["a","b","c","d"],"ans":0,"exp":"explicación breve"}]
donde ans es índice (0-3) de la respuesta correcta. Preguntas precisas, opciones plausibles. Responde en español.`}
    ]}]);
    return parseQuestions(text);
  }));
  const pool=results.flatMap(r=>r.status==='fulfilled'?r.value:[]);
  return shuffle(pool).slice(0,n);
}

// ── TIMER ──
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    simQuiz.elapsed++;
    const remaining=simQuiz.totalTime-simQuiz.elapsed;
    if(remaining<=0){clearInterval(timerInterval);finishSimulacro(true);return;}
    const el=document.getElementById('simTimer');
    if(el){
      el.textContent=formatTime(remaining);
      el.className='sim-timer'+(remaining<300?' critical':remaining<600?' warning':'');
    }
  },1000);
}
function formatTime(s){const m=Math.floor(s/60),ss=s%60;return`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}

// ── SIMULACRO QUIZ RENDER ──
function renderSimQuiz(c){
  if(simQuiz.current>=simQuiz.questions.length){finishSimulacro(false);return;}
  const q=simQuiz.questions[simQuiz.current];
  const pct=Math.round((simQuiz.current/simQuiz.questions.length)*100);
  const remaining=simQuiz.totalTime-simQuiz.elapsed;
  setTopBar('💀 Simulacro General',`${simQuiz.questions.length} preguntas · 90 minutos`);
  c.innerHTML=`<div class="sim-quiz-wrap">
    <div class="sim-topbar">
      <div id="simTimer" class="sim-timer ${remaining<300?'critical':remaining<600?'warning':''}">${formatTime(remaining)}</div>
      <div class="sim-prog">
        <div class="sim-prog-bar-wrap"><div class="sim-prog-bar" style="width:${pct}%"></div></div>
        <div class="sim-prog-label"><span>Pregunta ${simQuiz.current+1}/${simQuiz.questions.length}</span><span class="sim-score-live">✅ ${simQuiz.score} correctas</span></div>
      </div>
    </div>
    <div class="sim-q-num">Pregunta ${simQuiz.current+1}</div>
    <div class="sim-q-materia">${q._materiaIcon||''} ${q._materia||''}</div>
    <div class="sim-q-text">${q.q}</div>
    <div class="sim-options">${q.opts.map((opt,i)=>`<button class="sim-opt" onclick="simChoose(${i})"><span class="letter">${'abcd'[i]})</span><span>${opt}</span></button>`).join('')}</div>
    <div class="sim-feedback" id="sfb"></div>
    <button class="sim-next-btn" id="snb" onclick="simNextQ()">${simQuiz.current+1<simQuiz.questions.length?'Siguiente →':'Finalizar simulacro'}</button>
  </div>`;
}

function simChoose(i){
  if(simQuiz.answered)return;
  simQuiz.answered=true;
  const q=simQuiz.questions[simQuiz.current];
  document.querySelectorAll('.sim-opt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('sfb');
  if(i===q.ans){
    simQuiz.score++;
    document.querySelectorAll('.sim-opt')[i].classList.add('correct');
    fb.className='sim-feedback show ok';
    fb.innerHTML=`✅ <strong>Correcto</strong>${q.exp?' — '+q.exp:''}`;
  }else{
    document.querySelectorAll('.sim-opt')[i].classList.add('incorrect');
    document.querySelectorAll('.sim-opt')[q.ans].classList.add('reveal');
    simQuiz.wrongs.push({...q,chosen:i});
    fb.className='sim-feedback show ko';
    fb.innerHTML=`❌ <strong>Incorrecto</strong> — Correcta: <strong>${'abcd'[q.ans]}) ${q.opts[q.ans]}</strong>${q.exp?'<br><small>💡 '+q.exp+'</small>':''}`;
  }
  document.getElementById('snb').style.display='block';
}

function simNextQ(){simQuiz.current++;simQuiz.answered=false;if(simQuiz.current>=simQuiz.questions.length)finishSimulacro(false);else renderContent();}

async function finishSimulacro(timeOut=false){
  clearInterval(timerInterval);
  const pct=Math.round((simQuiz.score/simQuiz.questions.length)*100);
  const elapsed=simQuiz.elapsed;
  const entry={score:simQuiz.score,total:simQuiz.questions.length,pct,elapsed,timeout:timeOut,date:new Date().toLocaleDateString('es-ES'),time:new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})};
  simHistorial.unshift(entry);
  await dbSaveSimHistorial(entry);
  state.currentView='simulacro-results';
  renderContent();
}

async function generateAndCacheQuestions(file,materia,quiet=false){
  const fileObj=materia.files.find(x=>x.id===file.id);
  if(fileObj)fileObj._generating=true;
  if(!quiet)renderContent();
  try{
    const data=await dbGetFileData(file.id);
    if(!data){if(fileObj)delete fileObj._generating;if(!quiet)renderContent();return;}
    const base64=data.split(',')[1];
    const ti=materia.temario?`CRÍTICO: Genera preguntas ÚNICAMENTE sobre: ${materia.temario}.`:'Genera preguntas variadas.';
    // 5 llamadas paralelas de 20 = hasta 100 preguntas
    const calls=Array.from({length:5},(_,i)=>
      callClaude([{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},
        {type:'text',text:`Eres experto en oposiciones C1 Xunta de Galicia. ${ti} Genera exactamente 20 preguntas tipo test (lote ${i+1} de 5, preguntas DISTINTAS a los otros lotes). Devuelve SOLO array JSON sin backticks: [{"q":"pregunta","opts":["a","b","c","d"],"ans":0,"exp":"explicación"}] Responde en español.`}
      ]}]).then(t=>parseQuestions(t)).catch(()=>[])
    );
    const results=await Promise.all(calls);
    const unique=results.flat().filter((q,i,arr)=>arr.findIndex(x=>x.q===q.q)===i);
    await dbSaveQuestions(materia.id,file.id,unique);
    const m=state.materias.find(x=>x.id===materia.id);
    if(m)m.questionCount=(m.questionCount||0)+unique.length;
  }finally{
    if(fileObj)delete fileObj._generating;
    if(!quiet)renderContent();
  }
}

async function extractTextFromBase64PDF(base64){
  // Extract text from PDF using pdf.js
  const binary=atob(base64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  const pdfjsLib=await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js');
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
  const pdf=await pdfjsLib.getDocument({data:bytes}).promise;
  let text='';
  const maxPages=Math.min(pdf.numPages,30); // limit to 30 pages
  for(let i=1;i<=maxPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(item=>item.str).join(' ')+'\n';
  }
  return text.slice(0,15000); // limit to 15000 chars
}

async function callClaude(messages){
  let prompt='';
  let pdfBase64=null;
  for(const m of messages){
    if(Array.isArray(m.content)){
      for(const c of m.content){
        if(c.type==='text') prompt+=c.text+'\n';
        if(c.type==='document') pdfBase64=c.source.data;
      }
    } else {
      prompt+=m.content+'\n';
    }
  }
  const body={prompt};
  if(pdfBase64&&pdfBase64.length<3000000) body.pdfBase64=pdfBase64;
  const resp=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await resp.json();if(d.error)throw new Error(d.error);
  return(d.content||[]).map(x=>x.text||'').join('');
}

  c.innerHTML=`<div class="results-wrap"><div class="big-score" style="color:${color}">${quiz.score}/${quiz.questions.length}</div><div class="score-label">${pct}% de acertos</div><span class="grade-badge ${gc}">${g}</span><div class="stats-grid"><div class="stat-box ok"><div class="n">${quiz.score}</div><div class="l">Correctas</div></div><div class="stat-box ko"><div class="n">${quiz.questions.length-quiz.score}</div><div class="l">Incorrectas</div></div><div class="stat-box tot"><div class="n">${quiz.questions.length}</div><div class="l">Total</div></div></div><div class="results-actions"><button class="btn btn-primary" onclick="startQuiz('${state.quizMode}')">🔄 Novo test</button><button class="btn btn-secondary" onclick="showView('tests')">📋 Escoller modo</button></div>${quiz.wrongs.length?`<div class="wrong-review"><h3>❌ Repaso de erros (${quiz.wrongs.length})</h3>${quiz.wrongs.map(w=>`<div class="wrong-item"><div class="wq">${w.q}</div><div class="w-ans ko">✗ A túa resposta: ${LETTERS[w.chosen]}) ${w.opts[w.chosen]}</div><div class="w-ans ok">✓ Correcta: ${LETTERS[w.ans]}) ${w.opts[w.ans]}</div>${w.exp?`<div class="w-exp">💡 ${w.exp}</div>`:''}</div>`).join('')}</div>`:`<p style="text-align:center;padding:20px;color:var(--ok);font-size:1.5rem">🎉 Perfecto! Sen erros</p>`}</div>`;
}

async function clearHistory(){if(!confirm('Borrar historial?'))return;if(sb)await sb.from('historial').delete().eq('materia_id',state.currentMateria.id);state.currentMateria.history=[];renderContent();}

function renderFCCard(c){

}
function fcReveal(){fc.revealed=true;renderFCCard(document.getElementById('content'));}
function fcNext(sabido){if(sabido)fc.sabido++;else fc.noSabido++;fc.current++;fc.revealed=false;renderFCCard(document.getElementById('content'));}

async function renderFallos(c,m){

async function clearFallos(mid){
  if(!confirm('Borrar todos os fallos desta materia?'))return;

// ── STATS ──
function calcRacha(){
  const days=new Set();
  state.materias.forEach(m=>m.history.forEach(h=>{
    const p=h.date.split('/');
    if(p.length===3)days.add(`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`);
  }));
  if(!days.size)return 0;
  const sorted=[...days].sort().reverse();
  const today=new Date();today.setHours(0,0,0,0);
  const firstDay=new Date(sorted[0]+'T00:00:00');firstDay.setHours(0,0,0,0);
  const diffDays=Math.round((today-firstDay)/864e5);
  if(diffDays>1)return 0;
  let streak=0;
  const check=new Date(today);
  if(diffDays===1)check.setDate(check.getDate()-1);
  for(const ds of sorted){
    const d=new Date(ds+'T00:00:00');d.setHours(0,0,0,0);
    if(d.getTime()===check.getTime()){streak++;check.setDate(check.getDate()-1);}
    else break;
  }
  return streak;
}
function renderProgressChart(history){
  const data=history.slice(-20);
  if(data.length<2)return '';
  const W=480,H=130,PL=34,PR=10,PT=10,PB=26;
  const IW=W-PL-PR,IH=H-PT-PB;
  const xs=data.map((_,i)=>PL+i/(data.length-1)*IW);
  const ys=data.map(h=>PT+(1-h.pct/100)*IH);
  const line=xs.map((x,i)=>`${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area=`${line} L${xs[xs.length-1].toFixed(1)},${(PT+IH).toFixed(1)} L${PL},${(PT+IH).toFixed(1)} Z`;
  const y50=(PT+(1-.5)*IH).toFixed(1),y70=(PT+(1-.7)*IH).toFixed(1);
  const dots=data.map((h,i)=>`<circle cx="${xs[i].toFixed(1)}" cy="${ys[i].toFixed(1)}" r="4" fill="${h.pct>=70?'#22a06b':h.pct>=50?'#e6a817':'#d93025'}"><title>${h.date}: ${h.pct}%</title></circle>`).join('');
  const labels=data.map((h,i)=>i===0||i===data.length-1?`<text x="${xs[i].toFixed(1)}" y="${H-4}" font-size="8" fill="#5a7aa0" text-anchor="${i===0?'start':'end'}">${h.date.slice(0,5)}</text>`:'').join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible"><line x1="${PL}" y1="${y70}" x2="${W-PR}" y2="${y70}" stroke="#22a06b" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/><line x1="${PL}" y1="${y50}" x2="${W-PR}" y2="${y50}" stroke="#e6a817" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/><text x="${PL-4}" y="${parseFloat(y70)+4}" font-size="9" fill="#22a06b" text-anchor="end">70</text><text x="${PL-4}" y="${parseFloat(y50)+4}" font-size="9" fill="#e6a817" text-anchor="end">50</text><path d="${area}" fill="#003DA5" opacity=".08"/><path d="${line}" fill="none" stroke="#003DA5" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}${labels}</svg>`;
}
function renderStats(c,m){
  setTopBar(m.name,'Estatísticas');
  const racha=calcRacha();
  const h=m.history;
  const avg=h.length?Math.round(h.reduce((s,e)=>s+e.pct,0)/h.length):0;
  const best=h.length?Math.max(...h.map(e=>e.pct)):0;
  const aprobados=h.filter(e=>e.pct>=70).length;
  c.innerHTML=`<div class="stats-wrap"><div class="racha-card"><div class="racha-num">${racha>=7?'🔥':'⭐'} ${racha}</div><div><div class="racha-label">día${racha!==1?'s':''} de racha</div><div class="racha-sub">Días consecutivos estudando (todas as materias)</div></div></div><div class="stats-section"><h3>📊 ${m.name}</h3><div class="stats-grid"><div class="stat-box tot"><div class="n">${h.length}</div><div class="l">Tests feitos</div></div><div class="stat-box ${avg>=70?'ok':avg>=50?'':'ko'}"><div class="n">${avg}%</div><div class="l">Media</div></div><div class="stat-box ok"><div class="n">${best}%</div><div class="l">Mellor nota</div></div></div></div>${h.length>=2?`<div class="stats-section"><h3>📈 Progreso</h3>${renderProgressChart(h)}</div>`:''}${h.length?`<div class="stats-section"><h3>🗓️ Últimas sesións</h3>${[...h].reverse().slice(0,10).map(e=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:.82rem"><span style="font-weight:800;min-width:36px;color:${e.pct>=70?'var(--ok)':e.pct>=50?'var(--warn)':'var(--ko)'}">${e.pct}%</span><span>${e.score}/${e.total} · ${e.mode==='ia'?'✨ IA':'📋 Banco'}</span><span style="margin-left:auto;color:var(--muted)">${e.date}</span></div>`).join('')}</div>`:'<p style="color:var(--muted);font-size:.85rem;text-align:center;padding:20px">Completa tests para ver estatísticas.</p>'}</div>`;
}

function parseQuestions(text){
  // 1. Strip markdown code fences
  let s=text.replace(/```json|```/g,'').trim();
  // 2. Extract the JSON array (from first [ to last ])
  const start=s.indexOf('['),end=s.lastIndexOf(']');
  if(start!==-1&&end>start) s=s.slice(start,end+1);
  // 3. Try direct parse
  try{return JSON.parse(s);}catch(_){}
  // 4. Truncated JSON: close any open string, then close open objects/arrays
  let fixed=s.replace(/,\s*$/,'');  // trailing comma
  const opens=[...fixed].reduce((d,c)=>{if(c==='"'&&fixed[fixed.indexOf(c)-1]!=='\\')d.inStr=!d.inStr;if(!d.inStr){if(c==='[')d.arr++;else if(c===']')d.arr--;else if(c==='{')d.obj++;else if(c==='}')d.obj--;}return d;},{arr:0,obj:0,inStr:false});
  if(opens.inStr) fixed+='"';
  if(opens.obj>0) fixed+='}'.repeat(opens.obj);
  if(opens.arr>0) fixed+=']'.repeat(opens.arr);
  try{const r=JSON.parse(fixed);if(Array.isArray(r)&&r.length)return r;}catch(_){}
  // 5. Regex fallback: extract complete question objects
  const items=[],re=/\{\s*"q"\s*:\s*"((?:[^"\\]|\\.)*)"\s*,\s*"opts"\s*:\s*\[([^\]]+)\]\s*,\s*"ans"\s*:\s*(\d)\s*(?:,\s*"exp"\s*:\s*"((?:[^"\\]|\\.)*)")?\s*\}/g;
  let m;while((m=re.exec(s))!==null){try{const opts=JSON.parse('['+m[2]+']');items.push({q:m[1],opts,ans:parseInt(m[3]),exp:m[4]||''});}catch(_){}}
  if(items.length) return items;
  throw new Error('No se pudieron parsear las preguntas generadas.');
}

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
